<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clip Cutter — Extract video clips instantly</title>
  <meta name="description" content="Paste a direct video URL, set timestamps, and download your clip in seconds." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    /* ─── Reset & Base ──────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-primary: #0a0a0f;
      --bg-card: rgba(255,255,255,0.04);
      --bg-card-hover: rgba(255,255,255,0.06);
      --bg-input: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.08);
      --border-focus: rgba(139,92,246,0.5);
      --text-primary: #f0f0f5;
      --text-secondary: #8888a0;
      --text-muted: #55556a;
      --accent: #8b5cf6;
      --accent-glow: rgba(139,92,246,0.25);
      --danger: #ef4444;
      --success: #22c55e;
      --warning: #f59e0b;
      --radius: 12px;
      --radius-sm: 8px;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    html { font-size: 16px; }

    body {
      font-family: var(--font);
      background: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }

    /* Subtle background gradient animation */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% -20%, rgba(139,92,246,0.12), transparent),
        radial-gradient(ellipse 60% 50% at 80% 100%, rgba(59,130,246,0.08), transparent),
        radial-gradient(ellipse 50% 40% at 10% 60%, rgba(236,72,153,0.06), transparent);
      pointer-events: none;
      z-index: 0;
    }

    /* ─── Layout ────────────────────────────────────────────── */
    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 540px;
      padding: 2rem 1.25rem;
    }

    /* ─── Header ────────────────────────────────────────────── */
    .header {
      text-align: center;
      margin-bottom: 2.5rem;
      animation: fadeDown 0.6s ease;
    }

    .logo {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 1.5rem;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 0.5rem;
    }

    .logo-icon {
      width: 36px;
      height: 36px;
      background: linear-gradient(135deg, var(--accent), #ec4899);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.1rem;
    }

    .header p {
      color: var(--text-secondary);
      font-size: 0.9rem;
      line-height: 1.5;
    }

    /* ─── Card ──────────────────────────────────────────────── */
    .card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.75rem;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      animation: fadeUp 0.6s ease 0.1s both;
    }

    /* ─── Form ──────────────────────────────────────────────── */
    .form-group {
      margin-bottom: 1.25rem;
    }

    .form-group:last-of-type {
      margin-bottom: 1.5rem;
    }

    label {
      display: block;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.6px;
      margin-bottom: 0.5rem;
    }

    input[type="text"],
    input[type="url"] {
      width: 100%;
      padding: 0.75rem 1rem;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    input:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    input::placeholder {
      color: var(--text-muted);
    }

    .time-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 0.75rem;
    }

    .help-text {
      font-size: 0.75rem;
      color: var(--text-muted);
      margin-top: 0.35rem;
    }

    /* ─── Button ────────────────────────────────────────────── */
    .btn {
      width: 100%;
      padding: 0.8rem 1.5rem;
      font-family: var(--font);
      font-size: 0.95rem;
      font-weight: 600;
      border: none;
      border-radius: var(--radius-sm);
      cursor: pointer;
      transition: all 0.25s;
      position: relative;
      overflow: hidden;
    }

    .btn-primary {
      background: linear-gradient(135deg, var(--accent), #7c3aed);
      color: #fff;
      box-shadow: 0 4px 20px rgba(139,92,246,0.3);
    }

    .btn-primary:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 6px 28px rgba(139,92,246,0.4);
    }

    .btn-primary:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    /* ─── Status Panel ──────────────────────────────────────── */
    .status {
      margin-top: 1.25rem;
      padding: 1rem;
      border-radius: var(--radius-sm);
      font-size: 0.85rem;
      line-height: 1.5;
      display: none;
      animation: fadeUp 0.3s ease;
    }

    .status.visible { display: block; }

    .status.processing {
      background: rgba(139,92,246,0.1);
      border: 1px solid rgba(139,92,246,0.2);
      color: #c4b5fd;
    }

    .status.success {
      background: rgba(34,197,94,0.1);
      border: 1px solid rgba(34,197,94,0.2);
      color: #86efac;
    }

    .status.error {
      background: rgba(239,68,68,0.1);
      border: 1px solid rgba(239,68,68,0.2);
      color: #fca5a5;
    }

    .status-title {
      font-weight: 600;
      margin-bottom: 0.25rem;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }

    /* Spinner */
    .spinner {
      width: 14px;
      height: 14px;
      border: 2px solid rgba(139,92,246,0.3);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      display: inline-block;
    }

    /* ─── Progress bar ──────────────────────────────────────── */
    .progress-track {
      width: 100%;
      height: 4px;
      background: rgba(255,255,255,0.06);
      border-radius: 2px;
      margin-top: 0.75rem;
      overflow: hidden;
      display: none;
    }

    .progress-track.visible { display: block; }

    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), #ec4899);
      border-radius: 2px;
      width: 0%;
      animation: indeterminate 1.8s ease-in-out infinite;
    }

    /* ─── Footer ────────────────────────────────────────────── */
    .footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.75rem;
      color: var(--text-muted);
      animation: fadeUp 0.6s ease 0.3s both;
    }

    .footer a {
      color: var(--text-secondary);
      text-decoration: none;
      transition: color 0.2s;
    }

    .footer a:hover { color: var(--accent); }

    /* ─── Info badge ────────────────────────────────────────── */
    .info-bar {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      margin-top: 1.5rem;
      animation: fadeUp 0.6s ease 0.2s both;
    }

    .info-badge {
      font-size: 0.72rem;
      color: var(--text-muted);
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      padding: 0.3rem 0.7rem;
      border-radius: 20px;
      letter-spacing: 0.3px;
    }

    /* ─── Animations ────────────────────────────────────────── */
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @keyframes indeterminate {
      0%   { width: 0%;  margin-left: 0; }
      50%  { width: 60%; margin-left: 20%; }
      100% { width: 0%;  margin-left: 100%; }
    }

    /* ─── Responsive ────────────────────────────────────────── */
    @media (max-width: 480px) {
      .container { padding: 1.5rem 1rem; }
      .card { padding: 1.25rem; }
      .time-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <div class="container">

    <!-- Header -->
    <div class="header">
      <div class="logo">
        <div class="logo-icon">✂️</div>
        Clip Cutter
      </div>
      <p>Paste a direct video stream URL, set your timestamps, and download the clip.</p>
    </div>

    <!-- Main Card -->
    <div class="card">
      <form id="clipForm" autocomplete="off">

        <div class="form-group">
          <label for="urlInput">Video URL</label>
          <input
            id="urlInput"
            type="url"
            placeholder="https://example.com/video.m3u8"
            required
          />
          <div class="help-text">Direct stream links only — .m3u8, .mp4, .webm, .ts</div>
        </div>

        <div class="form-group">
          <label>Timestamps</label>
          <div class="time-row">
            <div>
              <input
                id="startInput"
                type="text"
                placeholder="00:00:00"
                required
              />
              <div class="help-text">Start (HH:MM:SS)</div>
            </div>
            <div>
              <input
                id="endInput"
                type="text"
                placeholder="00:01:30"
                required
              />
              <div class="help-text">End (HH:MM:SS)</div>
            </div>
          </div>
        </div>

        <button id="submitBtn" class="btn btn-primary" type="submit">
          Cut &amp; Download Clip
        </button>

        <!-- Progress -->
        <div id="progressTrack" class="progress-track">
          <div class="progress-bar"></div>
        </div>

        <!-- Status -->
        <div id="status" class="status">
          <div class="status-title" id="statusTitle"></div>
          <div id="statusMessage"></div>
        </div>

      </form>
    </div>

    <!-- Info badges -->
    <div class="info-bar">
      <span class="info-badge">Max 90s clips</span>
      <span class="info-badge">No re-encoding</span>
      <span class="info-badge">Auto-cleanup</span>
    </div>

    <div class="footer">
      <a href="/health">System Status</a>
    </div>

  </div>

  <script>
    const form       = document.getElementById('clipForm');
    const urlInput   = document.getElementById('urlInput');
    const startInput = document.getElementById('startInput');
    const endInput   = document.getElementById('endInput');
    const submitBtn  = document.getElementById('submitBtn');
    const statusEl   = document.getElementById('status');
    const statusTitle   = document.getElementById('statusTitle');
    const statusMessage = document.getElementById('statusMessage');
    const progressTrack = document.getElementById('progressTrack');

    // ── Helpers ─────────────────────────────────────────────
    function showStatus(type, title, message) {
      statusEl.className = `status visible ${type}`;
      statusTitle.innerHTML = title;
      statusMessage.textContent = message;
    }

    function hideStatus() {
      statusEl.className = 'status';
    }

    function setLoading(loading) {
      submitBtn.disabled = loading;
      submitBtn.textContent = loading ? 'Processing…' : 'Cut & Download Clip';
      progressTrack.classList.toggle('visible', loading);
    }

    // Auto-format timestamp fields (add colons as user types)
    function autoFormatTime(e) {
      let val = e.target.value.replace(/[^0-9]/g, '');
      if (val.length > 6) val = val.slice(0, 6);
      if (val.length >= 5) {
        val = val.slice(0,2) + ':' + val.slice(2,4) + ':' + val.slice(4);
      } else if (val.length >= 3) {
        val = val.slice(0,2) + ':' + val.slice(2);
      }
      e.target.value = val;
    }

    startInput.addEventListener('input', autoFormatTime);
    endInput.addEventListener('input', autoFormatTime);

    // ── Form submit ─────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      hideStatus();

      const url   = urlInput.value.trim();
      const start = startInput.value.trim();
      const end   = endInput.value.trim();

      if (!url || !start || !end) {
        showStatus('error', '⚠ Missing fields', 'Please fill in all fields.');
        return;
      }

      // Basic timestamp format check
      const timeRegex = /^\d{2}:\d{2}:\d{2}$/;
      if (!timeRegex.test(start) || !timeRegex.test(end)) {
        showStatus('error', '⚠ Invalid format', 'Timestamps must be in HH:MM:SS format.');
        return;
      }

      setLoading(true);
      showStatus('processing',
        '<span class="spinner"></span> Processing',
        'Validating URL and cutting your clip… This may take a moment.'
      );

      try {
        const response = await fetch('/clip', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ url, start, end }),
        });

        if (!response.ok) {
          // Try to parse error JSON
          let errMsg = 'Something went wrong.';
          try {
            const errData = await response.json();
            errMsg = errData.reason || errMsg;
          } catch { /* ignore parse error */ }
          showStatus('error', '✕ Failed', errMsg);
          setLoading(false);
          return;
        }

        // Success — download the video blob
        showStatus('processing',
          '<span class="spinner"></span> Downloading',
          'Clip is ready, downloading the file…'
        );

        const blob = await response.blob();
        const disposition = response.headers.get('Content-Disposition') || '';
        const filenameMatch = disposition.match(/filename="?(.+?)"?$/);
        const filename = filenameMatch ? filenameMatch[1] : 'clip.mp4';

        // Trigger download
        const downloadUrl = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = downloadUrl;
        a.download = filename;
        document.body.appendChild(a);
        a.click();
        a.remove();
        URL.revokeObjectURL(downloadUrl);

        showStatus('success', '✓ Done!', `Your clip "${filename}" has been downloaded.`);
      } catch (err) {
        showStatus('error', '✕ Network error', 'Could not reach the server. Please try again.');
      } finally {
        setLoading(false);
      }
    });
  </script>

</body>
</html>
